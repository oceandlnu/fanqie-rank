<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄女频新书榜 · 趋势分析 7月18日–7月24日</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --bg2: #171b26; --bg3: #1e2433; --border: #2a3040;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #f59e0b; --accent-dim: rgba(245,158,11,.12);
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
    --nav-h: 48px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; font-size: 14px; line-height: 1.6; }

  /* ── Header ── */
  .header {
    background: linear-gradient(160deg,#1c2138 0%,#0f1117 60%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 28px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  .header-left { flex: 1; min-width: 0; }
  .header-eyebrow { font-size: 11px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -.3px; line-height: 1.2; margin-bottom: 8px; }
  .header h1 span { color: var(--accent); }
  .header-sub { color: var(--text2); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; }
  .header-sub .dot { color: var(--border); }

  /* ── Floating period switcher ── */
  .period-float {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 3px;
    background: rgba(23,27,38,.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    box-shadow: 0 4px 28px rgba(0,0,0,.45);
  }
  .period-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px; font-weight: 600;
    color: var(--text3);
    background: transparent;
    border: 1px solid transparent;
    transition: color .15s, background .15s, border-color .15s, box-shadow .15s;
    white-space: nowrap;
    letter-spacing: .02em;
  }
  .period-btn:hover { color: var(--text2); border-color: var(--border); background: rgba(255,255,255,.04); }
  .period-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: rgba(245,158,11,.35);
    box-shadow: 0 0 10px rgba(245,158,11,.18);
  }
  .period-btn-num { font-size: 10px; font-weight: 700; color: inherit; opacity: .7; font-variant-numeric: tabular-nums; }

  /* ── Sticky nav ── */
  .sticky-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    height: var(--nav-h);
    display: flex; align-items: center;
    padding: 0 40px;
    gap: 4px;
    overflow-x: auto;
  }
  .sticky-nav::-webkit-scrollbar { display: none; }
  .nav-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px; font-weight: 500;
    color: var(--text3);
    white-space: nowrap;
    border: 1px solid transparent;
    transition: color .15s, border-color .15s, background .15s;
    text-decoration: none;
  }
  .nav-item:hover { color: var(--text2); border-color: var(--border); }
  .nav-item.active { color: var(--accent); border-color: rgba(245,158,11,.3); background: var(--accent-dim); }
  .nav-num { font-size: 10px; font-weight: 700; color: var(--text3); font-variant-numeric: tabular-nums; }
  .nav-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

  /* ── Layout ── */
  .period-panel { display: none; }
  .period-panel.active { display: block; }
  .container { max-width: 1320px; margin: 0 auto; padding: 32px 40px 80px; }
  .section { margin-bottom: 52px; scroll-margin-top: calc(var(--nav-h) + 16px); }
  .section-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 18px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-num { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .08em; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .section-title { font-size: 16px; font-weight: 700; }
  .badge { background: var(--accent); color: #000; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 3px; letter-spacing: .04em; flex-shrink: 0; }

  /* ── Cards & common ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .chart-wrap { position: relative; }
  .note { background: var(--accent-dim); border: 1px solid rgba(245,158,11,.2); border-radius: 8px; padding: 12px 16px; color: var(--text2); font-size: 12px; line-height: 1.7; margin-bottom: 20px; }
  .note strong { color: var(--accent); }

  /* ── Rec cards ── */
  .score-group { margin-bottom: 24px; }
  .score-group-label { font-size: 11px; color: var(--text3); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; padding-left: 2px; }
  .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .rec-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
  .rec-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
  .rec-card.s8::before { background: linear-gradient(180deg,#f59e0b,#ef4444); }
  .rec-card.s7::before { background: linear-gradient(180deg,#22c55e,#3b82f6); }
  .rec-card.s6::before { background: linear-gradient(180deg,#6366f1,#8b5cf6); }
  .rec-card.s5::before { background: #3498db; }
  .rec-card.slo::before { background: var(--bg3); }
  .rec-cat { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .rec-score-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 12px; margin-bottom: 10px; }
  .rec-score-badge.high { background: rgba(245,158,11,.15); color: var(--accent); border: 1px solid rgba(245,158,11,.3); }
  .rec-score-badge.med  { background: rgba(34,197,94,.12); color: #86efac; border: 1px solid rgba(34,197,94,.25); }
  .rec-score-badge.low  { background: rgba(100,116,139,.15); color: var(--text3); border: 1px solid rgba(100,116,139,.25); }
  .rec-stats { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .rec-stat .val { font-size: 15px; font-weight: 700; }
  .rec-stat .lbl { font-size: 11px; color: var(--text3); }
  .rec-reasons { display: flex; flex-wrap: wrap; gap: 4px; }
  .rec-reasons span { font-size: 11px; padding: 2px 7px; border-radius: 3px; }
  .tag-green  { background: rgba(34,197,94,.15); color: #86efac; }
  .tag-yellow { background: rgba(245,158,11,.15); color: #fde68a; }
  .tag-blue   { background: rgba(59,130,246,.15); color: #93c5fd; }
  .tag-purple { background: rgba(168,85,247,.15); color: #d8b4fe; }

  /* ── Table ── */
  .overview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .overview-table th { text-align: left; padding: 8px 12px; color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .overview-table td { padding: 7px 12px; border-bottom: 1px solid rgba(42,48,64,.5); white-space: nowrap; }
  .overview-table tr:hover td { background: var(--bg3); }
  .overview-table .cat-name { font-weight: 600; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill-up { background: rgba(34,197,94,.15); color: #86efac; }
  .pill-dn { background: rgba(239,68,68,.12); color: #fca5a5; }

  /* ── Racer tabs (赛道) ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); background: var(--bg3); border: 1px solid var(--border); transition: all .15s; }
  .tab:hover { color: var(--text); border-color: var(--text3); }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Book table ── */
  .book-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 16px; }
  .book-table th { text-align: left; padding: 7px 10px; color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border); }
  .book-table td { padding: 7px 10px; border-bottom: 1px solid rgba(42,48,64,.4); }
  .book-table tr:hover td { background: var(--bg3); }
  .book-table a { color: var(--blue); text-decoration: none; }
  .book-table a:hover { text-decoration: underline; }
  .trend-up { color: var(--green); font-weight: 600; }
  .trend-mid { color: #f97316; font-weight: 600; }
  .trend-dn { color: var(--red); }
  .expand-btn { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 4px; padding: 1px 7px; font-size: 11px; cursor: pointer; transition: all .15s; }
  .expand-btn:hover { border-color: var(--text2); color: var(--text); }
  .book-detail-row { display: none; }
  .book-detail-row.open { display: table-row; }
  .book-detail-row td { padding: 10px 14px 14px; background: var(--bg3); border-bottom: 1px solid rgba(42,48,64,.4); }
  .book-detail-inner { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .book-detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .book-detail-tag { background: rgba(59,130,246,.12); color: #93c5fd; border-radius: 3px; padding: 1px 7px; font-size: 11px; }

  /* ── Tags ── */
  .tag-section { margin-top: 16px; }
  .tag-section-title { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 12px; }
  .tag-bar-list { display: flex; flex-direction: column; gap: 7px; }
  .tag-bar-row { display: flex; align-items: center; gap: 10px; }
  .tag-bar-name { width: 80px; font-size: 12px; color: var(--text); text-align: right; flex-shrink: 0; }
  .tag-bar-track { flex: 1; background: var(--bg3); border-radius: 3px; height: 16px; overflow: hidden; }
  .tag-bar-fill { height: 100%; border-radius: 3px; }
  .tag-bar-count { font-size: 11px; color: var(--text3); flex-shrink: 0; width: 36px; }

  /* ── Layout helpers ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
  .book-layout { display: grid; grid-template-columns: minmax(0, 5fr) minmax(0, 7fr); gap: 16px; align-items: start; margin-top: 4px; }
  .book-layout > .card { margin-top: 0; }
  @media (max-width: 1100px) { .book-layout { grid-template-columns: 1fr; } }

  /* ── Solo legend ── */
  .legend-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text2);
    cursor: pointer;
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid transparent;
    transition: border-color .12s, opacity .12s, background .12s;
    user-select: none;
  }
  .legend-item:hover { border-color: var(--border); background: rgba(255,255,255,.03); }
  .legend-item.dimmed { opacity: .22; }
  .legend-item.solo { border-color: var(--accent); background: var(--accent-dim); color: var(--text); opacity: 1; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-hint { font-size: 11px; color: var(--text3); align-self: center; margin-left: 4px; flex-shrink: 0; }

  @media (max-width: 600px) {
    .header { padding: 20px; }
    .container { padding: 20px 16px 60px; }
    .sticky-nav { padding: 0 16px; }
  }
</style>
</head>

/* ── Solo-legend helper ──────────────────────────────────────────────
   点一次：solo 该条，其他 dimmed
   再点同一条：恢复全部
   点另一条：切换 solo 目标
*/
function attachSoloLegend(legEl, chart, datasets) {
  let soloIdx = -1;
  const items = [];
  datasets.forEach((ds, i) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${ds.borderColor}"></span>${ds.label||ds.fullTitle||''}`;
    item.addEventListener('click', () => {
      if (soloIdx === i) {
        // restore all
        soloIdx = -1;
        for (let j = 0; j < datasets.length; j++) {
          chart.getDatasetMeta(j).hidden = false;
          items[j].classList.remove('solo','dimmed');
        }
      } else {
        soloIdx = i;
        for (let j = 0; j < datasets.length; j++) {
          const hidden = j !== i;
          chart.getDatasetMeta(j).hidden = hidden;
          items[j].classList.toggle('solo', j === i);
          items[j].classList.toggle('dimmed', hidden);
        }
      }
      chart.update();
    });
    items.push(item);
    legEl.appendChild(item);
  });
  if (datasets.length > 1) {
    const hint = document.createElement('span');
    hint.className = 'legend-hint';
    hint.textContent = '点击只看该曲线';
    legEl.appendChild(hint);
  }
}

function buildNav(sfx) {
  const nav = document.getElementById('stickyNav');
  nav.innerHTML = '';
  SECTION_DEFS.forEach((s, idx) => {
    if (idx > 0) {
      const sep = document.createElement('div');
      sep.className = 'nav-sep';
      nav.appendChild(sep);
    }
    const a = document.createElement('a');
    a.className = 'nav-item' + (s.key === activeNavKey ? ' active' : '');
    a.href = '#sec-' + s.key + '-' + sfx;
    a.innerHTML = `<span class="nav-num">0${idx+1}</span>${s.label}`;
    a.addEventListener('click', e => {
      e.preventDefault();
      activeNavKey = s.key;
      document.querySelectorAll('#stickyNav .nav-item').forEach(el => el.classList.remove('active'));
      a.classList.add('active');
      const target = document.getElementById('sec-' + s.key + '-' + sfx);
      if (target) target.scrollIntoView({behavior:'smooth',block:'start'});
    });
    nav.appendChild(a);
  });
}

/* scrollspy */
let spyObserver = null;
function setupScrollSpy(sfx) {
  if (spyObserver) spyObserver.disconnect();
  const navH = 48;
  spyObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const id = entry.target.id;
      const key = id.replace('sec-','').replace('-'+sfx,'');
      activeNavKey = key;
      const a = document.querySelector(`#stickyNav a[href="#${id}"]`);
      if (!a) return;
      document.querySelectorAll('#stickyNav .nav-item').forEach(el=>el.classList.remove('active'));
      a.classList.add('active');
    });
  }, { rootMargin: `-${navH}px 0px -60% 0px`, threshold: 0 });
  SECTION_DEFS.forEach(s => {
    const el = document.getElementById('sec-' + s.key + '-' + sfx);
    if (el) spyObserver.observe(el);
  });
}

function renderReport(D, sfx) {
  const panel = document.getElementById('panel' + sfx);
  const n = D.n;

  panel.innerHTML = `
  <div class="container">
    <div class="section" id="sec-rec-${sfx}">
      <div class="section-header">
        <span class="section-num">01</span>
        <span class="badge">推荐</span>
        <span class="section-title">赛道综合评分</span>
      </div>
      <div class="note">
        <strong>评分维度（满分10分）：</strong><br>
        增长趋势：${n}日总在读涨幅 &gt; 0% → +3分，-3%~0%（稳定）→ +1分<br>
        竞争系数（第1名在读 ÷ 中位数在读，越低越好）：&lt;5 → +3分，5~7 → +2分，7~10 → +1分<br>
        赛道体量：总在读 &gt; 200万 → +2分，100~200万 → +1分<br>
        10万+书目：≥10本 → +2分，4~9本 → +1分

      <div id="rec-container-${sfx}"></div>
    </div>
    <div class="section" id="sec-overview-${sfx}">

        <span class="section-num">02</span>
        <span class="badge">总览</span>
        <span class="section-title">在读人数呈趋势上升的赛道</span>
      </div>
      <div class="note">从全部 18 个分类中筛选出 ${n} 日内在读人数持续上升的题材，共 ${D.nRising} 个。点击图例可单独查看某个分类的曲线。</div>
      <div class="card">
        <div id="overview-legend-${sfx}" class="legend-row"></div>
        <div class="chart-wrap" style="height:320px"><canvas id="overviewChart-${sfx}"></canvas></div>
      </div>
    </div>
    <div class="section" id="sec-compare-${sfx}">
      <div class="section-header">
        <span class="section-num">03</span>
        <span class="badge">对比</span>
        <span class="section-title">${n}日增幅 &amp; 竞争系数分析</span>
      </div>
      <div class="two-col">
        <div class="card">
          <div style="font-size:13px;color:var(--text2);margin-bottom:12px">${n}日总在读增幅（${D.startLabel}→${D.endLabel}）</div>
          <div class="chart-wrap" style="height:520px"><canvas id="growthChart-${sfx}"></canvas></div>
        </div>
        <div class="card">
          <div style="font-size:13px;color:var(--text2);margin-bottom:12px">赛道定位图：总在读 vs 竞争系数（气泡大小 = 10万+书目数）</div>
          <div class="chart-wrap" style="height:320px"><canvas id="bubbleChart-${sfx}"></canvas></div>
        </div>
      </div>
    </div>
    <div class="section" id="sec-table-${sfx}">
      <div class="section-header">
        <span class="section-num">04</span>
        <span class="badge">数据</span>
        <span class="section-title">全分类汇总表（${D.endLabel}快照）</span>
      </div>
      <div class="card" style="overflow-x:auto">
        <table class="overview-table" id="overviewTable-${sfx}"></table>
      </div>
    </div>
    <div class="section" id="sec-books-${sfx}">
      <div class="section-header">
        <span class="section-num">05</span>
        <span class="badge">书目</span>
        <span class="section-title">推荐赛道 &amp; 对标书目</span>
      </div>
      <div class="note">仅展示连续 ${n} 天上榜且净增 &gt; 0 的书目，按净增降序排列。</div>
      <div class="tabs" id="bookTabs-${sfx}"></div>
      <div id="bookTabContents-${sfx}"></div>
    </div>
  </div>`;

  buildNav(sfx);
  setTimeout(() => setupScrollSpy(sfx), 200);

  // ① 推荐卡片
  (function() {
    const container = document.getElementById('rec-container-' + sfx);
    const groups = {};
    D.recTracks.forEach(t => { if (!groups[t.score]) groups[t.score] = []; groups[t.score].push(t); });
    const scoreLabels = { 8:'★★★ 强烈推荐', 9:'★★★ 强烈推荐', 10:'★★★ 强烈推荐', 11:'★★★ 强烈推荐', 7:'★★☆ 推荐', 6:'★★☆ 建议关注', 5:'★☆☆ 参考', 4:'☆☆☆ 谨慎', 3:'☆☆☆ 谨慎', 2:'不建议', 1:'不建议' };
    Object.keys(groups).sort((a,b)=>b-a).forEach(score => {
      const s = parseInt(score);
      const groupEl = document.createElement('div');
      groupEl.className = 'score-group';
      const labelEl = document.createElement('div');
      labelEl.className = 'score-group-label';
      labelEl.textContent = `${scoreLabels[s] || ''} — ${s}分`;
      groupEl.appendChild(labelEl);
      const grid = document.createElement('div');
      grid.className = 'rec-grid';
      groups[score].forEach(t => {
        const tierClass = s>=8?'s8':s===7?'s7':s===6?'s6':s===5?'s5':'slo';
        const scoreClass = s>=8?'high':s>=6?'med':'low';
        const gHtml = t.growth>=0?`<span class="pill pill-up">+${t.growth}%</span>`:`<span class="pill pill-dn">${t.growth}%</span>`;
        const reasonsHtml = t.reasons.map(r=>{
          let cls='tag-blue';
          if(r.includes('增长'))cls='tag-green';
          else if(r.includes('稳定'))cls='tag-yellow';
          else if(r.includes('系数低')||r.includes('系数较低'))cls='tag-green';
          else if(r.includes('系数中'))cls='tag-yellow';
          else if(r.includes('10万'))cls='tag-purple';
          return `<span class="${cls}">${r}</span>`;
        }).join('');
        grid.innerHTML += `<div class="rec-card ${tierClass}">
          <div class="rec-cat">${t.cat}</div>
          <div class="rec-score-badge ${scoreClass}">综合评分 ${s}分</div>
          <div class="rec-stats">
            <div class="rec-stat"><div class="val">${t.total19}万</div><div class="lbl">总在读</div></div>
            <div class="rec-stat"><div class="val">${gHtml}</div><div class="lbl">${n}日增幅</div></div>
            <div class="rec-stat"><div class="val" style="color:${t.coeff<5?'#22c55e':t.coeff<7?'#3b82f6':t.coeff<10?'#f59e0b':'#ef4444'}">${t.coeff}</div><div class="lbl">竞争系数</div></div>
            <div class="rec-stat"><div class="val">${t.count10w>0?t.count10w+'本':'—'}</div><div class="lbl">10万+书</div></div>
          </div>
          <div class="rec-reasons">${reasonsHtml}</div>
        </div>`;
      });
      groupEl.appendChild(grid);
      container.appendChild(groupEl);
    });
  })();

  // ② 上升题材折线图（solo legend）
  (function() {
    const ctx = document.getElementById('overviewChart-' + sfx).getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: { labels: D.days, datasets: D.overviewDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1e2433', borderColor: '#2a3040', borderWidth: 1,
            callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y}万` } }
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: '#64748b' } },
          y: { grid: { color: gridColor }, ticks: { color: '#64748b', callback: v => v+'万' } }
        }
      }
    });
    const legEl = document.getElementById('overview-legend-' + sfx);
    attachSoloLegend(legEl, chart, D.overviewDatasets);
    if (!chartRegistry[sfx]) chartRegistry[sfx] = [];
    chartRegistry[sfx].push(chart);
  })();

  // ③ 增幅柱状图
  (function() {
    const chart = new Chart(document.getElementById('growthChart-' + sfx).getContext('2d'), {
      type: 'bar',
      data: { labels: D.growthCats, datasets: [{ data: D.growthValues,
        backgroundColor: D.growthColors.map(c=>c+'cc'), borderColor: D.growthColors,
        borderWidth: 1, borderRadius: 3 }] },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false },
          tooltip: { backgroundColor: '#1e2433', borderColor: '#2a3040', borderWidth: 1,
            callbacks: { label: c => ` ${c.parsed.x>0?'+':''}${c.parsed.x}%` } } },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: '#64748b', callback: v => v+'%' } },
          y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 12 } } }
        }
      }
    });
    if (!chartRegistry[sfx]) chartRegistry[sfx] = [];
    chartRegistry[sfx].push(chart);
  })();

  // ③ 气泡图
  (function() {
    const colors = ['#f39c12','#c0392b','#95a5a6','#d35400','#e67e22','#27ae60','#3498db',
      '#1abc9c','#f1c40f','#7f8c8d','#1e8449','#8e44ad','#9b59b6','#2ecc71',
      '#16a085','#2980b9','#e74c3c','#e91e8c'];
    const chart = new Chart(document.getElementById('bubbleChart-' + sfx).getContext('2d'), {
      type: 'bubble',
      data: { datasets: D.bubbleData.map((b,i) => ({
        label: b.label, data: [{x:b.x,y:b.y,r:b.r}],
        backgroundColor: colors[i%colors.length]+'88', borderColor: colors[i%colors.length], borderWidth: 1.5
      })) },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false },
          tooltip: { backgroundColor: '#1e2433', borderColor: '#2a3040', borderWidth: 1,
            callbacks: { title: c => c[0].dataset.label,
              label: c => { const b=D.bubbleData.find(b=>b.label===c.dataset.label);
                return [` 总在读：${c.parsed.x}万`,` 竞争系数：${c.parsed.y}`,` 10万+：${b?b.count10w:'-'}本`]; } } } },
        scales: {
          x: { grid:{color:gridColor}, ticks:{color:'#64748b',callback:v=>v+'万'}, title:{display:true,text:'总在读（万）',color:'#64748b'} },
          y: { grid:{color:gridColor}, ticks:{color:'#64748b'}, title:{display:true,text:'竞争系数（越低越好）',color:'#64748b'} }
        }
      },
      plugins: [{ id:'bubbleLabels', afterDatasetsDraw(chart2) {
        const ctx2=chart2.ctx;
        chart2.data.datasets.forEach((ds,i)=>{ chart2.getDatasetMeta(i).data.forEach(el=>{
          const {x,y}=el.getProps(['x','y']);
          ctx2.save(); ctx2.fillStyle='#e2e8f0'; ctx2.font='10px PingFang SC,sans-serif';
          ctx2.textAlign='center'; ctx2.fillText(ds.label,x,y+3); ctx2.restore();
        }); });
      } }]
    });
    if (!chartRegistry[sfx]) chartRegistry[sfx] = [];
    chartRegistry[sfx].push(chart);
  })();

  // ④ 汇总表
  (function() {
    const sorted = Object.keys(D.metrics).sort((a,b)=>D.metrics[b].total19-D.metrics[a].total19);
    const table = document.getElementById('overviewTable-' + sfx);
    table.innerHTML = `<thead><tr><th>分类</th><th>总在读（万）</th><th>${n}日增幅</th><th>在读均值（万）</th><th>竞争系数</th><th>10万+书</th></tr></thead>
    <tbody>${sorted.map((cat,i)=>{
      const m=D.metrics[cat];
      const gClass=m.growth>=0?'pill-up':'pill-dn';
      const gStr=(m.growth>=0?'+':'')+m.growth+'%';
      const cc=m.coeff<=5?'#22c55e':m.coeff<=10?'#f59e0b':'#ef4444';
      return `<tr><td class="cat-name">${i+1}. ${cat}</td><td>${m.total19}</td>
        <td><span class="pill ${gClass}">${gStr}</span></td><td>${m.mean}</td>
        <td style="color:${cc};font-weight:600">${m.coeff}</td>
        <td>${m.count10w>0?m.count10w+'本':'<span style=\"color:var(--text3)\">—</span>'}</td></tr>`;
    }).join('')}</tbody>`;
  })();

  // ⑤ 书目折线图 + 趋势表 + 热门标签
  (function() {
    const cats = Object.keys(D.bookChartData);
    const tabsEl = document.getElementById('bookTabs-' + sfx);
    const contsEl = document.getElementById('bookTabContents-' + sfx);
    cats.forEach((cat, ci) => {
      const tab = document.createElement('div');
      tab.className = 'tab'+(ci===0?' active':'');
      tab.textContent = cat; tab.dataset.cat = cat + '-' + sfx;
      tabsEl.appendChild(tab);
      const allBooks = D.bookChartData[cat];
      const content = document.createElement('div');
      content.className = 'tab-content'+(ci===0?' active':'');
      content.id = 'tab-' + cat + '-' + sfx;
      const dayCols = allBooks.length > 0
        ? allBooks[0].data.map((_,di) => `<th>${D.days[di] || ''}</th>`).join('')
        : D.days.map(d => `<th>${d}</th>`).join('');
      content.innerHTML = `
        <div class="book-layout">
          <div class="card">
            <div style="font-size:13px;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
              <span>${cat} · 在读人数折线图（万人）</span>
            </div>
            <div id="bookLegend-${sfx}-${ci}" class="legend-row" style="margin-bottom:10px"></div>
            <div class="chart-wrap" style="height:480px"><canvas id="bookChart-${sfx}-${ci}"></canvas></div>
          </div>
          <div class="card" style="overflow-x:auto">
            <div style="font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
              <span>全部书目趋势（${D.days[0]}→${D.days[D.days.length-1]}，按净增排序）</span>
              <span style="font-size:12px;color:#ef4444;font-weight:600">累计净增 +${allBooks.reduce((s,b)=>+(s+b.trend).toFixed(2),0)}万</span>
            </div>
            <table class="book-table">
              <thead><tr><th></th><th>#</th><th>书名</th>${dayCols}<th>字数</th><th>净增</th></tr></thead>
              <tbody id="bookTbody-${sfx}-${ci}"></tbody>
            </table>
          </div>
        </div>`;
      contsEl.appendChild(content);

      const tags = (D.catTags||{})[cat]||[];
      if (tags.length) {
        const maxCount = tags[0].count;
        const barColors = {'豪门总裁':'#e74c3c','青春甜宠':'#e91e8c','古言脑洞':'#f39c12','悬疑脑洞':'#1abc9c','现言脑洞':'#9b59b6'};
        const barColor = barColors[cat]||'#3498db';
        const totalBooks = allBooks.length;
        const tagSec = document.createElement('div');
        tagSec.className = 'tag-section card';
        tagSec.style.marginTop = '16px';
        tagSec.innerHTML = `
          <div class="tag-section-title">📌 热门标签（基于 ${totalBooks} 本上榜书，可作为开书参考）</div>
          <div class="tag-bar-list">
            ${tags.slice(0,10).map(t=>`
              <div class="tag-bar-row">
                <div class="tag-bar-name">${t.tag}</div>
                <div class="tag-bar-track"><div class="tag-bar-fill" style="width:${Math.round(t.count/maxCount*100)}%;background:${barColor}99"></div></div>
                <div class="tag-bar-count">${t.count}本</div>
              </div>`).join('')}
          </div>`;
        content.appendChild(tagSec);
      }

      (function() {
        const tbody = document.getElementById('bookTbody-' + sfx + '-' + ci);
        if (!tbody) return;
        const sorted = [...allBooks].sort((a,b)=>b.trend-a.trend);
        sorted.forEach((b, i) => {
          const tStr = b.trend>0?`+${b.trend}`:`${b.trend}`;
          const tCls = b.trend>=1?'trend-up':b.trend>0?'trend-mid':b.trend<0?'trend-dn':'';
          const wn = b.wordNumber||0;
          const wStr = wn>0?(Math.round(wn/1000)/10).toFixed(1)+'万':'—';
          const rid = `dr-${sfx}-${ci}-${i}`;
          const btnId = `btn-${sfx}-${ci}-${i}`;
          const cols = b.data.map(v=>`<td>${v}万</td>`).join('');
          const tr = document.createElement('tr');
          tr.style.cursor = 'pointer';
          tr.innerHTML = `
            <td><button class="expand-btn" id="${btnId}">+</button></td>
            <td style="color:var(--text3)">${i+1}</td>
            <td><a href="${b.link}" target="_blank" onclick="event.stopPropagation()">${b.fullTitle}</a></td>
            ${cols}
            <td style="color:var(--text2)">${wStr}</td>
            <td class="${tCls}">${tStr}万</td>`;
          tbody.appendChild(tr);
          const dr = document.createElement('tr');
          dr.className = 'book-detail-row';
          dr.id = rid;
          const colspan = 5 + b.data.length;
          const tagsHtml = (b.tags||[]).map(t=>`<span class="book-detail-tag">${t}</span>`).join('');
          dr.innerHTML = `<td colspan="${colspan}">
            <div class="book-detail-inner">
              <div><span style="color:var(--text3)">书名：</span><span style="color:var(--text);font-weight:600">${b.fullTitle}</span></div>
              <div style="margin-top:4px"><span style="color:var(--text3)">作品简介：</span>${b.desc||'暂无简介'}</div>
              ${tagsHtml?`<div class="book-detail-tags">${tagsHtml}</div>`:''}
            </div></td>`;
          tbody.appendChild(dr);
          const toggle = () => {
            const row = document.getElementById(rid);
            const open = row.classList.toggle('open');
            const btn = document.getElementById(btnId);
            if (btn) btn.textContent = open ? '−' : '+';
          };
          tr.addEventListener('click', toggle);
        });
      })();

      // 书目折线图（带 solo legend），延迟渲染
      setTimeout(() => {
        const cvs = document.getElementById('bookChart-' + sfx + '-' + ci);
        if (!cvs) return;
        const chart = new Chart(cvs.getContext('2d'), {
          type: 'line',
          data: { labels: D.days, datasets: allBooks },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { display: false },
              tooltip: { backgroundColor: '#1e2433', borderColor: '#2a3040', borderWidth: 1,
                callbacks: { label: c => ` ${c.dataset.fullTitle||c.dataset.label}: ${c.parsed.y}万` } } },
            scales: {
              x: { grid:{color:gridColor}, ticks:{color:'#64748b'} },
              y: { grid:{color:gridColor}, ticks:{color:'#64748b',callback:v=>parseFloat(v.toFixed(1))+'万'} }
            }
          }
        });
        const legEl = document.getElementById('bookLegend-' + sfx + '-' + ci);
        if (legEl) attachSoloLegend(legEl, chart, allBooks);
        if (!chartRegistry[sfx]) chartRegistry[sfx] = [];
        chartRegistry[sfx].push(chart);
      }, 60*(ci+1));
    });

    tabsEl.addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      tabsEl.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      contsEl.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      tab.classList.add('active');
      const el = document.getElementById('tab-' + tab.dataset.cat);
      if (el) el.classList.add('active');
    });
  })();
}

// Period switcher
let renderedPanels = {};
function switchPeriod(p) {
  document.getElementById('btn7').classList.toggle('active', p==='7');
  document.getElementById('btn3').classList.toggle('active', p==='3');
  document.getElementById('panel7').classList.toggle('active', p==='7');
  document.getElementById('panel3').classList.toggle('active', p==='3');
  const D = p==='7' ? D7 : D3;
  document.getElementById('header-range-label').textContent = D.dateRange;
  document.getElementById('header-date-range').textContent = D.startLabel + '–' + D.endLabel;
  if (!renderedPanels[p]) {
    renderedPanels[p] = true;
    renderReport(D, p);
  } else {
    buildNav(p);
    setTimeout(() => setupScrollSpy(p), 200);
  }
}

// Default: 7日
switchPeriod('7');
document.getElementById('btn7').addEventListener('click', () => switchPeriod('7'));
document.getElementById('btn3').addEventListener('click', () => switchPeriod('3'));
